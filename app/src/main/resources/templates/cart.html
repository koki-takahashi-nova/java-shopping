<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カート - ショッピングサイト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">ショッピングサイト</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/cart">カート</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>ショッピングカート</h1>
        
        <div th:if="${cart.items.empty}" class="alert alert-info">
            カートは空です。
        </div>
        
        <div th:unless="${cart.items.empty}">
            <table class="table">
                <thead>
                    <tr>
                        <th>商品名</th>
                        <th>価格</th>
                        <th>数量</th>
                        <th>小計</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cart.items}">
                        <td th:text="${item.product.name}">商品名</td>
                        <td th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + '円'">価格</td>
                        <td th:text="${item.quantity}">数量</td>
                        <td th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + '円'">小計</td>
                        <td>
                            <form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post">
                                <button type="submit" class="btn btn-danger btn-sm">削除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" class="text-end"><strong>合計:</strong></td>
                        <td th:text="${#numbers.formatDecimal(cart.total, 0, 'COMMA', 0, 'POINT')} + '円'" colspan="2">合計</td>
                    </tr>
                </tfoot>
            </table>
            
            <div class="text-end mt-3">
                <a href="/" class="btn btn-secondary">買い物を続ける</a>
                <a href="/checkout" class="btn btn-primary">注文する</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

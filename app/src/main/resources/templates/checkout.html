<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注文情報入力 - ショッピングサイト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">ショッピングサイト</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>注文情報入力</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>お客様情報</h3>
                <form th:action="@{/order}" method="post" th:object="${customer}">
                    <div class="mb-3">
                        <label for="name" class="form-label">お名前</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">メールアドレス</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">住所</label>
                        <textarea class="form-control" id="address" th:field="*{address}" rows="3" required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="phoneNumber" class="form-label">電話番号</label>
                        <input type="tel" class="form-control" id="phoneNumber" th:field="*{phoneNumber}" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">注文を確定する</button>
                </form>
            </div>
            
            <div class="col-md-6">
                <h3>注文内容</h3>
                <table class="table">
                    <thead>
                        <tr>
                            <th>商品名</th>
                            <th>数量</th>
                            <th>小計</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td th:text="${item.product.name}">商品名</td>
                            <td th:text="${item.quantity}">数量</td>
                            <td th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + '円'">小計</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="2" class="text-end"><strong>合計:</strong></td>
                            <td th:text="${#numbers.formatDecimal(cart.total, 0, 'COMMA', 0, 'POINT')} + '円'">合計</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

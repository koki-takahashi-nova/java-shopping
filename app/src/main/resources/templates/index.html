<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ショッピングサイト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">ショッピングサイト</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/cart">カート</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>商品一覧</h1>

        <form action="/search" method="get" class="mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="keyword" class="form-label">商品名キーワード</label>
                    <input type="text" class="form-control" id="keyword" name="keyword"
                           th:value="${keyword}" placeholder="キーワードを入力">
                </div>
                <div class="col-md-3">
                    <label for="minPrice" class="form-label">最低価格（円）</label>
                    <input type="number" class="form-control" id="minPrice" name="minPrice"
                           th:value="${minPrice}" placeholder="下限なし" min="0">
                </div>
                <div class="col-md-3">
                    <label for="maxPrice" class="form-label">最高価格（円）</label>
                    <input type="number" class="form-control" id="maxPrice" name="maxPrice"
                           th:value="${maxPrice}" placeholder="上限なし" min="0">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">検索</button>
                </div>
            </div>
        </form>

        <!-- 価格帯クイックフィルターボタン --> 
        <div class="mb-4">
            <a href="/filter/low" class="btn btn-outline-secondary me-2">～10,000円</a>
            <a href="/filter/mid" class="btn btn-outline-secondary me-2">10,001円～50,000円</a>
            <a href="/filter/high" class="btn btn-outline-secondary me-2">50,001円～</a>
            <a href="/" class="btn btn-outline-secondary">リセット</a>
        </div>

        <div th:if="${resultCount != null}" class="mb-3">
            <p th:if="${resultCount == 0}" class="text-muted">条件に一致する商品が見つかりませんでした</p>
            <p th:if="${resultCount > 0}" class="text-muted" th:text="${resultCount + '件見つかりました'}"></p>
        </div>

        <div class="row">
            <div th:each="product : ${products}" class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.name}">商品名</h5>
                        <p class="card-text" th:text="${product.description}">商品説明</p>
                        <p class="card-text">
                            <strong>価格: </strong>
                            <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">0</span>円
                        </p>
                        <p class="card-text">
                            <strong>カテゴリ: </strong>
                            <span th:text="${product.category}">カテゴリ</span>
                        </p>
                        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                            <button type="submit" class="btn btn-primary">カートに追加</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

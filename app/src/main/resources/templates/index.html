<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ショッピングサイト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">ショッピングサイト</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/cart">カート</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>商品一覧</h1>
        
        <div class="row">
            <div th:each="product : ${products}" class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.name}">商品名</h5>
                        <p class="card-text" th:text="${product.description}">商品説明</p>
                        <p class="card-text">
                            <strong>価格: </strong>
                            <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">0</span>円
                        </p>
                        <p class="card-text">
                            <strong>カテゴリ: </strong>
                            <span th:text="${product.category}">カテゴリ</span>
                        </p>
                        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                            <button type="submit" class="btn btn-primary">カートに追加</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
